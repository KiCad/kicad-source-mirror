syntax = "proto3";

package kiapi.board;

import "common/types/base_types.proto";
import "board/board_types.proto";

message BoardFinish
{
  string type_name = 1;
}

message BoardImpedanceControl
{
  bool is_controlled = 1;
}

message BoardEdgeConnector
{
}

message Castellation
{
  bool has_castellated_pads = 1;
}

message EdgePlating
{
  bool has_edge_plating = 1;
}

message BoardEdgeSettings
{
  BoardEdgeConnector connector = 1;
  Castellation castellation = 2;
  EdgePlating plating = 3;
}

message BoardStackupCopperLayer
{

}

enum BoardStackupLayerType
{
  BSLT_UNKNOWN = 0;
  BSLT_COPPER = 1;
  BSLT_DIELECTRIC = 2;
  BSLT_SILKSCREEN = 3;
  BSLT_SOLDERMASK = 4;
  BSLT_SOLDERPASTE = 5;
  BSLT_UNDEFINED = 7;
}

message BoardStackupDielectricProperties
{
  double epsilon_r = 1;
  double loss_tangent = 2;
  string material_name = 3;
  kiapi.common.types.Distance thickness = 4;
}

message BoardStackupDielectricLayer
{
  // A single dielectric slot (between copper layers) can be made up of multiple physical layers
  repeated BoardStackupDielectricProperties layer = 1;
}

message BoardStackupLayer
{
  kiapi.common.types.Distance thickness = 1;
  kiapi.board.types.BoardLayer layer = 2;
  bool enabled = 3;
  BoardStackupLayerType type = 4;
  BoardStackupDielectricLayer dielectric = 5;
  kiapi.common.types.Color color = 6;
  string material_name = 7;

  // The name of the layer shown in the KiCad GUI, which may be a default value like "F.Cu" or may
  // have been customized by the user.  This field does not apply to dielectric layers.
  string user_name = 8;
}

message BoardStackup
{
  BoardFinish finish = 1;
  BoardImpedanceControl impedance = 2;
  // NOTE: m_HasThicknessConstrains appears to be unused
  BoardEdgeSettings edge = 3;
  repeated BoardStackupLayer layers = 4;
}

// LAYER_CLASS_* in BOARD_DESIGN_SETTINGS -- needs to become an enum class
enum BoardLayerClass
{
  BLC_UNKNOWN = 0;
  BLC_SILKSCREEN = 1;
  BLC_COPPER = 2;
  BLC_EDGES = 3;
  BLC_COURTYARD = 4;
  BLC_FABRICATION = 5;
  BLC_OTHER = 6;
}

message BoardLayerGraphicsDefaults
{
  BoardLayerClass layer = 1;
  kiapi.common.types.TextAttributes text = 2;
  kiapi.common.types.Distance line_thickness = 3;
}

message GraphicsDefaults
{
  repeated BoardLayerGraphicsDefaults layers = 1;
}

// Anything that isn't stackup or design rules
message BoardSettings
{
  GraphicsDefaults graphics_defaults = 1;
  // Dimension default settings
}

message MinimumConstraints
{
  kiapi.common.types.Distance min_clearance = 1;
  kiapi.common.types.Distance min_groove_width = 2;
  kiapi.common.types.Distance min_connection_width = 3;
  kiapi.common.types.Distance min_track_width = 4;
  kiapi.common.types.Distance min_via_annular_width = 5;
  kiapi.common.types.Distance min_via_size = 6;
  kiapi.common.types.Distance min_through_drill = 7;
  kiapi.common.types.Distance min_microvia_size = 8;
  kiapi.common.types.Distance min_microvia_drill = 9;
  kiapi.common.types.Distance copper_edge_clearance = 10;
  kiapi.common.types.Distance hole_clearance = 11;
  kiapi.common.types.Distance hole_to_hole_min = 12;
  kiapi.common.types.Distance silk_clearance = 13;
  int32 min_resolved_spokes = 14;
  kiapi.common.types.Distance min_silk_text_height = 15;
  kiapi.common.types.Distance min_silk_text_thickness = 16;
}

message PresetTrackWidth
{
  kiapi.common.types.Distance width = 1;
}

message PresetViaDimension
{
  kiapi.common.types.Distance diameter = 1;
  kiapi.common.types.Distance drill = 2;
}

message PresetDiffPairDimension
{
  kiapi.common.types.Distance width = 1;
  kiapi.common.types.Distance gap = 2;
  kiapi.common.types.Distance via_gap = 3;
}

message PredefinedSizes
{
  repeated PresetTrackWidth tracks = 1;
  repeated PresetViaDimension vias = 2;
  repeated PresetDiffPairDimension diff_pairs = 3;
}

message SolderMaskPasteDefaults
{
  kiapi.common.types.Distance mask_expansion = 1;
  kiapi.common.types.Distance mask_min_width = 2;
  kiapi.common.types.Distance mask_to_copper_clearance = 3;
  kiapi.common.types.Distance paste_margin = 4;
  double paste_margin_ratio = 5;
  bool allow_soldermask_bridges_in_footprints = 6;
}

enum TeardropTarget
{
  TDT_UNKNOWN = 0;
  TDT_ROUND = 1;
  TDT_RECT = 2;
  TDT_TRACK = 3;
}

message TeardropTargetParams
{
  bool enabled = 1;
  kiapi.common.types.Distance max_length = 2;
  kiapi.common.types.Distance max_width = 3;
  double best_length_ratio = 4;
  double best_width_ratio = 5;
  double width_to_size_filter_ratio = 6;
  bool curved_edges = 7;
  bool allow_two_tracks = 8;
  bool on_pads_in_zones = 9;
}

message TeardropTargetEntry
{
  TeardropTarget target = 1;
  TeardropTargetParams params = 2;
}

message TeardropDefaults
{
  bool target_vias = 1;
  bool target_pth_pads = 2;
  bool target_smd_pads = 3;
  bool target_track_to_track = 4;
  bool use_round_shapes_only = 5;
  repeated TeardropTargetEntry target_params = 6;
}

message ViaProtectionDefaults
{
  bool tent_front = 1;
  bool tent_back = 2;
  bool cover_front = 3;
  bool cover_back = 4;
  bool plug_front = 5;
  bool plug_back = 6;
  bool cap = 7;
  bool fill = 8;
}

